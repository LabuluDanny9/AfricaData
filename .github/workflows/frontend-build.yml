# Vérifie que le frontend build (dont prebuild → sitemap + robots) réussit.
name: Frontend build

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Vérification SEO (informatif en CI)
        run: npm run verify:seo
        env:
          CI: true

      - name: Build (inclut generate-sitemap en prebuild)
        run: npm run build
