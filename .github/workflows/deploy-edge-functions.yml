# Déploie les Edge Functions Africadata (emails) sur Supabase
# Déclenchement : manuel (workflow_dispatch) ou à chaque push sur main qui modifie supabase/functions/
name: Deploy Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy send-submission-confirmation-email
          supabase functions deploy send-validation-email
          supabase functions deploy send-rejection-email
